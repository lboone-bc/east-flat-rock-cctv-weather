<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>I-26 / East Flat Rock NC — CCTV &amp; Weather Wall</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Overpass+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="crt-overlay" aria-hidden="true"></div>
  <div class="boot-flash" aria-hidden="true"></div>

  <header class="topbar">
    <div class="topbar-title">
      <span class="eyebrow">Traffic Operations &middot; Henderson / Polk Co.</span>
      <h1>I-26 <span class="slash">/</span> East Flat Rock</h1>
    </div>
    <div class="topbar-right">
      <span id="conditions-chip" class="conditions-chip">—</span>
      <span class="topbar-divider" aria-hidden="true"></span>
      <span class="feed-count">12 FEEDS</span>
      <span class="topbar-divider" aria-hidden="true"></span>
      <span id="clock" class="clock">--:--:--</span>
      <button id="fullscreen-toggle" class="fullscreen-toggle" type="button" aria-label="Enter fullscreen" title="Enter fullscreen">⛶</button>
    </div>
  </header>

  <main class="wall">
    <section class="cameras" id="camera-grid" aria-label="Live traffic cameras">
      <!-- camera tiles injected by cameras.js -->
    </section>

    <aside class="weather" aria-label="East Flat Rock, NC weather">
      <div class="panel current-conditions" id="current-conditions">
        <h2>East Flat Rock, NC</h2>
        <div class="current-loading">Loading current conditions…</div>
      </div>

      <div class="panel forecast" id="forecast">
        <h2>3-Day Forecast</h2>
        <div class="forecast-loading">Loading forecast…</div>
      </div>

      <div class="panel radar">
        <h2>Radar</h2>
        <div class="radar-frame">
          <div id="radar-map"></div>
          <span class="radar-readout">EAST FLAT ROCK, NC &middot; SECTOR SCAN</span>
          <span id="radar-time" class="radar-time"></span>
        </div>
        <div class="radar-attribution">Radar data © <a href="https://www.rainviewer.com/" target="_blank" rel="noopener">RainViewer.com</a></div>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- NCDOT camera feeds are HLS (.m3u8) streams; hls.js plays them in browsers -->
  <!-- without native HLS support (everything except Safari/iOS). -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script type="module" src="cameras.js"></script>
  <script type="module" src="weather.js"></script>
</body>
</html>
